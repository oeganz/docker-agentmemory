services:
  agentmemory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentmemory
    restart: always
    ports:
      - "3111:3111"
      - "3112:3112"
      - "3113:3113"
    environment:
      - NODE_ENV=production
    volumes:
      - agentmemory_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3111/agentmemory/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  agentmemory_data:
    driver: local
    labels:
      - "backup.priority=critical"
      - "backup.type=sqlite"
      - "description=agentmemory persistent memory storage"
